name: Build OpenWrt Custom Firmware

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ "main" ]

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt.git
  OPENWRT_BRANCH: openwrt-24.10

jobs:
  build:
    name: Build x86_64 Generic
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo (我们的配置)
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-pykwalify rsync unzip zlib1g-dev file wget curl \
            libelf-dev libudev-dev cmake swig patchelf libpcap0.8-dev
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Build info
        run: |
          echo "CPU cores: $(nproc)"
          echo "RAM: $(free -h | grep Mem | awk '{print $2}')"
          df -h

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_REPO }} openwrt
          cd openwrt
          echo "=== Commit ==="
          git log --oneline -1

      - name: Add custom feeds
        run: |
          cd openwrt
          # 备份原始 feeds.conf.default
          cp feeds.conf.default feeds.conf
          # 追加自定义 feeds
          cat ../feeds/feeds.conf.append >> feeds.conf
          cat feeds.conf
          # 更新 feeds（有失败也继续）
          ./scripts/feeds update -a 2>&1 || echo "FEEDS_UPDATE_FAILED=true" >> $GITHUB_ENV

      - name: Install packages from feeds
        run: |
          cd openwrt
          ./scripts/feeds install -a

      - name: Configure build
        run: |
          cd openwrt
          # 复制配置种子
          cp ../config.seed .config
          # 补充默认配置
          make defconfig
          echo "=== .config summary ==="
          ./scripts/diffconfig.sh

      - name: Download source code
        run: |
          cd openwrt
          make download -j$(nproc) 2>&1 | tail -20
          # 验证下载完整性
          find dl -type f -name "*.ipk" 2>/dev/null | head -5 || true

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tail -50

      - name: List built images
        run: |
          ls -lh openwrt/bin/targets/x86/64/
          echo "=== Factory images ==="
          find openwrt/bin/targets/x86/64/ -name "*combined*" -o -name "*generic*"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-custom
          path: openwrt/bin/targets/x86/64/
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/logs/
          retention-days: 7
