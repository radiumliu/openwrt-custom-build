name: Build OpenWrt Custom Firmware

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt.git
  OPENWRT_BRANCH: openwrt-25.12

jobs:
  build:
    name: Build x86_64 Generic
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-pykwalify rsync unzip zlib1g-dev file wget curl \
            libelf-dev libudev-dev cmake swig patchelf libpcap0.8-dev
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Clone OpenWrt source (25.12)
        run: |
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_REPO }} openwrt
          cd openwrt
          echo "Commit: $(git log --oneline -1)"

      - name: Clone custom packages
        run: |
          cd openwrt
          # 直接 clone 到 package/ 目录，不用第三方 feeds
          git clone --depth=1 https://github.com/EasyTier/luci-app-easytier.git package/easytier
          git clone --depth=1 https://github.com/douglarek/luci-app-homeproxy.git package/homeproxy
          git clone --depth=1 https://github.com/gdy666/luci-app-lucky.git package/lucky
          echo "=== Custom packages ==="
          ls -d package/easytier package/homeproxy package/lucky

      - name: Update default feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        run: |
          cd openwrt
          # 1. 只写 target，生成基础配置
          cat << EOF > .config
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_MULTI_PROFILE=y
          EOF
          make defconfig
          echo "=== Base config: $(wc -l < .config) lines ==="
          
          # 2. 追加 ext4 + GRUB 镜像设置
          cat >> .config << 'EOF2'
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_GRUB_IMAGES=y
          CONFIG_GRUB_TIMEOUT="3"
          EOF2
          
          # 3. 从 config.seed 追加所有包选项
          grep '^CONFIG_PACKAGE_.*=[ym]$' ../config.seed >> .config
          
          # 4. 补全依赖（不重置已有选项）
          make olddefconfig 2>&1
          echo "=== Final check ==="
          grep -E "ROOTFS_EXT4|GRUB_IMAGES" .config
          echo "=== Package count ==="
          grep -c "CONFIG_PACKAGE_" .config

      - name: Download sources
        run: |
          cd openwrt
          make download -j$(nproc) 2>&1 | tail -20

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tail -50

      - name: List built images
        run: |
          echo "=== ALL files in output ==="
          find openwrt/bin/targets/x86/64/ -type f -ls 2>/dev/null
          echo "=== Images ==="
          find openwrt/bin/targets/x86/64/ -name "*.img*" -o -name "*.iso" -o -name "*.vdi" -o -name "*.vmdk" 2>/dev/null

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-custom
          path: openwrt/bin/targets/x86/64/
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/logs/
          retention-days: 7
