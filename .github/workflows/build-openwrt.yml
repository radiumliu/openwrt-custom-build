name: Build OpenWrt Custom Firmware (ImageBuilder 25.12.3)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build x86_64 Firmware
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install zstd
        run: |
          sudo apt-get update && sudo apt-get install -y zstd

      - name: Download OpenWrt ImageBuilder 25.12.3
        run: |
          mkdir -p ib
          wget -q https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-imagebuilder-25.12.3-x86-64.Linux-x86_64.tar.zst -O ib.tar.zst
          tar -I zstd -xf ib.tar.zst -C ib --strip-components=1
          rm -f ib.tar.zst
          echo "ImageBuilder 25.12.3 ready"
          ls ib/ | head -5

      - name: Clone custom packages
        run: |
          cd ib
          git clone --depth=1 https://github.com/EasyTier/luci-app-easytier.git package/easytier
          git clone --depth=1 https://github.com/douglarek/luci-app-homeproxy.git package/homeproxy
          git clone --depth=1 https://github.com/gdy666/luci-app-lucky.git package/lucky
          # Patch homeproxy's +sing-box to avoid Kconfig warning
          sed -i 's/+sing-box/sing-box/' package/homeproxy/Makefile
          # Update package index
          make package/symlinks 2>&1

      - name: Build firmware image
        run: |
          cd ib

          PACKAGES="base-files busybox dropbear dnsmasq-full firewall4 nftables-json \
            odhcpd-ipv6only odhcp6c \
            kmod-r8169 kmod-e1000e kmod-e1000 kmod-igb kmod-ixgbe kmod-tg3 kmod-bnx2 \
            kmod-forcedeth kmod-amazon-ena kmod-amd-xgbe kmod-dwmac-intel kmod-igc \
            kmod-tun kmod-gre kmod-ppp kmod-pppoe kmod-pptp kmod-macvlan kmod-ifb \
            kmod-nf-flow kmod-nft-offload \
            kmod-ipt-tproxy kmod-ipt-ipopt kmod-ipt-iprange kmod-ipt-socket kmod-ipt-conntrack-extra \
            kmod-phy-realtek kmod-crypto-hwcc kmod-pps kmod-ptp kmod-slhc \
            kmod-fs-vfat kmod-nls-cp437 kmod-nls-iso8859-1 kmod-nls-utf8 \
            ip-full ipset iptables-nft iptables-mod-tproxy iptables-mod-conntrack-extra \
            iptables-mod-ipopt iptables-mod-iprange iptables-mod-socket \
            ip6tables-nft xtables-legacy xtables-nft \
            tc-tiny resolveip \
            mwan3 luci-app-mwan3 \
            ppp ppp-mod-pppoe ppp-mod-pptp pptpd \
            xray-core shadowsocks-rust-sslocal shadowsocks-rust-ssserver \
            shadowsocksr-libev-ssr-local shadowsocksr-libev-ssr-redir shadowsocksr-libev-ssr-check \
            shadowsocksr-libev-ssr-server \
            naiveproxy hysteria tuic-client \
            v2ray-geoip v2ray-geosite v2ray-plugin v2dat \
            simple-obfs-client microsocks dns2socks dns2tcp \
            haproxy tcping eoip \
            chinadns-ng mosdns luci-app-mosdns ddns-go \
            socat luci-app-socat \
            ttyd luci-app-ttyd \
            miniupnpd-nftables luci-app-upnp \
            luci-app-qos qos-scripts \
            luci-app-eqos \
            luci-app-statistics collectd collectd-mod-cpu collectd-mod-interface \
            collectd-mod-load collectd-mod-memory collectd-mod-network collectd-mod-rrdtool \
            rrdtool1 geoview \
            luci-app-wol etherwake \
            luci-app-filemanager \
            luci-app-vlmcsd vlmcsd \
            luci-app-advanced-reboot \
            luci-app-package-manager \
            luci luci-base luci-compat luci-mod-admin-full \
            luci-mod-network luci-mod-status luci-mod-system \
            luci-proto-ppp luci-proto-ipv6 luci-theme-bootstrap \
            luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn \
            luci-i18n-mwan3-zh-cn luci-i18n-mosdns-zh-cn \
            luci-i18n-socat-zh-cn luci-i18n-ttyd-zh-cn \
            luci-i18n-upnp-zh-cn luci-i18n-qos-zh-cn \
            luci-i18n-eqos-zh-cn luci-i18n-statistics-zh-cn \
            luci-i18n-wol-zh-cn luci-i18n-filemanager-zh-cn \
            luci-i18n-vlmcsd-zh-cn luci-i18n-advanced-reboot-zh-cn \
            luci-i18n-package-manager-zh-cn luci-i18n-lucky-zh-cn \
            curl ca-bundle jq unzip coreutils coreutils-base64 coreutils-nohup \
            nping e2fsprogs partx-utils mkf2fs \
            uclient-fetch ubox openwrt-keyring \
            homeproxy luci-app-homeproxy \
            easytier luci-app-easytier \
            lucky luci-app-lucky"

          # ImageBuilder 的 --strip 参数用来排除不需要的包
          # 但我们直接不装它们就行
          make image PROFILE=generic PACKAGES="$PACKAGES" \
            BIN_DIR="$GITHUB_WORKSPACE/bin" \
            FILES="../files/" 2>&1

      - name: List built images
        run: |
          ls -lh bin/
          echo "=== Images ==="
          find bin/ -name "*.img*" -o -name "*.iso" -o -name "*.vdi" -o -name "*.vmdk" 2>/dev/null | head -10

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-custom
          path: bin/
          retention-days: 14
