name: Build OpenWrt Custom Firmware (ImageBuilder)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build x86_64 Firmware
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download OpenWrt ImageBuilder 24.10.3
        run: |
          wget -q https://downloads.openwrt.org/releases/24.10.3/targets/x86/64/openwrt-imagebuilder-24.10.3-x86-64.Linux-x86_64.tar.xz
          tar -xJf openwrt-imagebuilder-*.tar.xz
          mv openwrt-imagebuilder-* ib
          echo "ImageBuilder ready"

      - name: Configure ImageBuilder
        run: |
          cd ib

          # Add kenzo feed (for lucky, etc.)
          echo "src/gz openwrt_kenzo https://downloads.openwrt.org/releases/24.10.3/packages/x86_64/kenzo" >> repositories.conf

          # Clone custom packages
          git clone --depth=1 https://github.com/EasyTier/luci-app-easytier.git package/easytier
          git clone --depth=1 https://github.com/douglarek/luci-app-homeproxy.git package/homeproxy
          git clone --depth=1 https://github.com/gdy666/luci-app-lucky.git package/lucky

          # Patch homeproxy's +sing-box to avoid Kconfig warning
          sed -i 's/+sing-box/sing-box/' package/homeproxy/Makefile

          # Update package index
          make package/symlinks 2>&1

      - name: Build firmware image
        run: |
          cd ib

          PACKAGES="\
            base-files busybox dropbear dnsmasq-full firewall4 \
            kmod-r8169 kmod-e1000e kmod-e1000 kmod-igb kmod-ixgbe kmod-tg3 kmod-bnx2 kmod-forcedeth kmod-amazon-ena kmod-amd-xgbe kmod-dwmac-intel kmod-igc \
            kmod-tun kmod-gre kmod-ppp kmod-pppoe kmod-pptp kmod-macvlan kmod-ifb \
            kmod-nf-flow kmod-nft-offload kmod-ipt-tproxy kmod-ipt-ipopt kmod-ipt-iprange kmod-ipt-socket kmod-ipt-conntrack-extra \
            kmod-crypto-hwcc kmod-phy-realtek \
            ip-full ipset iptables-nft iptables-mod-tproxy nftables-json xtables-legacy xtables-nft \
            mwan3 luci-app-mwan3 \
            ppp ppp-mod-pppoe ppp-mod-pptp pptpd \
            luci luci-ssl luci-base luci-compat luci-mod-admin-full luci-mod-network luci-mod-status luci-mod-system \
            luci-proto-ppp luci-proto-ipv6 luci-theme-bootstrap \
            luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn \
            xray-core shadowsocks-rust-sslocal shadowsocksr-libev-ssr-local shadowsocksr-libev-ssr-redir \
            shadowsocksr-libev-ssr-check naiveproxy hysteria tuic-client \
            v2ray-geoip v2ray-geosite v2ray-plugin simple-obfs-client \
            microsocks dns2socks dns2tcp haproxy tcping \
            chinadns-ng mosdns luci-app-mosdns ddns-go \
            socat luci-app-socat \
            ttyd luci-app-ttyd \
            miniupnpd-nftables luci-app-upnp \
            luci-app-qos qos-scripts \
            luci-app-eqos \
            luci-app-statistics collectd collectd-mod-cpu collectd-mod-interface collectd-mod-load collectd-mod-memory collectd-mod-network collectd-mod-rrdtool rrdtool1 \
            luci-app-wol etherwake \
            luci-app-filemanager \
            luci-app-vlmcsd vlmcsd \
            luci-app-advanced-reboot \
            luci-app-package-manager \
            curl ca-bundle jq unzip coreutils coreutils-base64 coreutils-nohup nping e2fsprogs partx-utils \
            homeproxy easytier luci-app-easytier lucky luci-app-lucky \
            --strip gost luci-app-gost passwall2 luci-app-passwall2 cshark luci-app-cshark"

          make image PROFILE=generic PACKAGES="$PACKAGES" \
            BIN_DIR="$GITHUB_WORKSPACE/bin" \
            FILES="../files/" 2>&1

      - name: List built images
        run: |
          ls -lh bin/
          find bin/ -name "*.img*" -o -name "*.iso" -o -name "*.vdi" -o -name "*.vmdk"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-custom
          path: bin/
          retention-days: 14
